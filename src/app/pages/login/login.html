<!-- styled one  -->

<div class="min-h-[80vh] flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-md w-96 border border-gray-100">
    
    <div class="text-center mb-8">
      <h2 class="text-2xl font-bold text-gray-800">Welcome to TMS</h2>
      <p class="text-gray-500 text-sm mt-2">Sign in to your account</p>
    </div>

    <form [formGroup]="reactiveForm" (ngSubmit)="onLogin()" class="space-y-6">
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
        <input 
          type="email" 
          formControlName="email"
          placeholder="Enter your email" 
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none transition-all"
        >
        @if (inValid('email')) {
          <div class="text-red-500 text-xs font-medium mt-1">Please enter a valid email address.</div>
        }
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input 
          type="password" 
          formControlName="password"
          placeholder="Enter your password" 
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none transition-all"
        >
        @if (inValid('password')) {
          <div class="text-red-500 text-xs font-medium mt-1">Password is required.</div>
        }
      </div>

      @if (errorMessage) {
        <div class="text-red-500 text-sm font-medium text-center bg-red-50 p-2 rounded border border-red-100">
          {{ errorMessage }}
        </div>
      }

      <!-- UPDATED BUTTON: Added [disabled] and dynamic text -->
      <button 
        type="submit" 
        [disabled]="isLoading"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-md transition-colors disabled:bg-blue-400 disabled:cursor-not-allowed"
      >
        {{ isLoading ? 'Verifying...' : 'Sign In' }}
      </button>

    </form>

    <div class="mt-6 text-center text-sm text-gray-600">
      Don't have an account? 
      <a routerLink="/signup" class="text-blue-600 hover:underline font-medium">Sign up here</a>
    </div>

  </div>
</div>
